<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Star to Planet — 3D игра</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #030318 0%, #0a0a2a 50%, #1a1a3a 100%);
            color: white;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* 3D контейнер */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI поверх canvas */
        .ui-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2;
            pointer-events: none;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            z-index: 10;
            pointer-events: auto;
        }

        .balance {
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            color: #FFD60A;
        }

        .sound-btn {
            background: rgba(0,0,0,0.6);
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 20px;
            cursor: pointer;
            color: #FFD60A;
        }

        .energy-bar {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            padding: 8px 16px;
            margin: 70px 16px 16px 16px;
            border-radius: 32px;
            pointer-events: auto;
        }

        .energy-progress {
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            height: 8px;
            overflow: hidden;
            margin-top: 4px;
        }

        .energy-fill {
            background: linear-gradient(90deg, #FFD60A, #FF9F0A);
            width: 100%;
            height: 100%;
            border-radius: 20px;
            transition: width 0.2s;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            padding: 8px 16px;
            font-size: 12px;
            color: #ccc;
        }

        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255,255,255,0.1);
            z-index: 10;
            pointer-events: auto;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: #8E8E93;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border-radius: 32px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
        }

        .nav-btn.active { 
            color: #FFD60A; 
            background: rgba(255, 214, 10, 0.15);
        }

        .nav-icon {
            font-size: 22px;
        }

        .message {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #FFD60A;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="ui-overlay">
    <div class="top-bar">
        <div>⭐ Star to Planet</div>
        <div style="display: flex; gap: 10px;">
            <button class="sound-btn" id="soundToggle">🔊</button>
            <div class="balance">🪙 <span id="coins">0</span></div>
        </div>
    </div>

    <div class="energy-bar">
        <div>⚡ Энергия <span id="energyValue">100/100</span></div>
        <div class="energy-progress">
            <div class="energy-fill" id="energyFill" style="width:100%"></div>
        </div>
    </div>

    <div class="stats">
        <span>💪 Сила клика: <span id="clickPower">1</span></span>
        <span>🤖 Пассивный доход: <span id="passiveRate">0</span>/мин</span>
    </div>

    <div class="nav-bar">
        <button class="nav-btn active" data-tab="game">
            <span class="nav-icon">🎮</span>
            <span>Игра</span>
        </button>
        <button class="nav-btn" data-tab="boost">
            <span class="nav-icon">⚡</span>
            <span>Буст</span>
        </button>
        <button class="nav-btn" data-tab="profile">
            <span class="nav-icon">👤</span>
            <span>Профиль</span>
        </button>
    </div>
</div>

<div id="message" class="message" style="display:none"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // ========== ИГРОВЫЕ ПЕРЕМЕННЫЕ ==========
    let coins = 0;
    let energy = 100;
    let maxEnergy = 100;
    let clickPower = 1;
    let passiveIncomeLevel = 0;
    let hasMoon = false;
    let hasEarth = false;
    let hasSun = false;
    
    let lastClickTime = 0;
    let clickCooldown = 30; // миллисекунд между кликами (для мультитапа)
    
    // ========== ЗВУК ==========
    let soundEnabled = true;
    let tapSound = null;
    
    // Создаём звук через Web Audio API (не требует файлов)
    function createTapSound() {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const gainNode = audioContext.createGain();
        gainNode.gain.value = 0.3;
        gainNode.connect(audioContext.destination);
        
        return () => {
            if (!soundEnabled) return;
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            oscillator.connect(gain);
            gain.connect(gainNode);
            oscillator.frequency.value = 800;
            gain.gain.value = 0.2;
            oscillator.type = 'sine';
            oscillator.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.3);
            oscillator.stop(audioContext.currentTime + 0.3);
        };
    }
    
    // Инициализируем звук после взаимодействия пользователя
    let playTapSound = null;
    let audioContextInitialized = false;
    
    function initAudio() {
        if (audioContextInitialized) return;
        try {
            playTapSound = createTapSound();
            audioContextInitialized = true;
        } catch(e) {
            console.log('Web Audio API не поддерживается');
        }
    }
    
    // ========== 3D СЦЕНА ==========
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = null;
    scene.fog = new THREE.FogExp2(0x030318, 0.003);
    
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 4);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);
    
    // Освещение
    const ambientLight = new THREE.AmbientLight(0x404060);
    scene.add(ambientLight);
    
    const mainLight = new THREE.DirectionalLight(0xffffff, 1);
    mainLight.position.set(2, 3, 4);
    scene.add(mainLight);
    
    const fillLight = new THREE.PointLight(0x4466aa, 0.5);
    fillLight.position.set(-2, 1, 2);
    scene.add(fillLight);
    
    // Создаём планету
    const geometry = new THREE.SphereGeometry(1, 128, 128);
    const textureLoader = new THREE.TextureLoader();
    const earthMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
    const material = new THREE.MeshStandardMaterial({
        map: earthMap,
        roughness: 0.5,
        metalness: 0.1
    });
    const planet = new THREE.Mesh(geometry, material);
    scene.add(planet);
    
    // Звёздный фон
    const starCount = 1500;
    const starGeometry = new THREE.BufferGeometry();
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
        starPositions[i*3] = (Math.random() - 0.5) * 200;
        starPositions[i*3+1] = (Math.random() - 0.5) * 200;
        starPositions[i*3+2] = (Math.random() - 0.5) * 100 - 50;
    }
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starMaterialObj = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.7 });
    const stars = new THREE.Points(starGeometry, starMaterialObj);
    scene.add(stars);
    
    // Анимация вращения
    function animate() {
        requestAnimationFrame(animate);
        planet.rotation.y += 0.003;
        stars.rotation.y += 0.0005;
        renderer.render(scene, camera);
    }
    animate();
    
    window.addEventListener('resize', onWindowResize);
    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
    
    // ========== МУЛЬТИТАП С ЗВУКОМ ==========
    function handleTap(clientX, clientY) {
        const now = Date.now();
        if (now - lastClickTime < clickCooldown) return;
        lastClickTime = now;
        
        if (energy < clickPower) {
            showMessage('❌ Нет энергии!', true);
            return;
        }
        
        // Активируем звук при первом касании
        if (!audioContextInitialized) {
            initAudio();
        }
        
        // Воспроизводим звук
        if (playTapSound) playTapSound();
        
        energy -= clickPower;
        coins += clickPower;
        
        // Анимация нажатия
        planet.scale.set(0.96, 0.96, 0.96);
        setTimeout(() => {
            planet.scale.set(1, 1, 1);
        }, 100);
        
        // Вспышка света
        const flashLight = new THREE.PointLight(0xffaa66, 1);
        flashLight.position.set(
            (clientX / window.innerWidth - 0.5) * 5,
            -(clientY / window.innerHeight - 0.5) * 4,
            2
        );
        scene.add(flashLight);
        setTimeout(() => scene.remove(flashLight), 150);
        
        // Всплывающее число
        const popup = document.createElement('div');
        popup.textContent = `+${clickPower}`;
        popup.style.position = 'fixed';
        popup.style.left = clientX + 'px';
        popup.style.top = clientY - 30 + 'px';
        popup.style.color = '#FFD60A';
        popup.style.fontSize = '24px';
        popup.style.fontWeight = 'bold';
        popup.style.pointerEvents = 'none';
        popup.style.zIndex = '1000';
        popup.style.textShadow = '0 0 5px black';
        popup.style.animation = 'popupAnim 0.4s ease-out forwards';
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 400);
        
        updateUI();
        saveGame();
        sendDataToBot();
    }
    
    // Обработчики мультитапа
    renderer.domElement.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touches = e.touches;
        for (let i = 0; i < touches.length; i++) {
            const touch = touches[i];
            handleTap(touch.clientX, touch.clientY);
        }
    });
    
    renderer.domElement.addEventListener('mousedown', (e) => {
        e.preventDefault();
        handleTap(e.clientX, e.clientY);
    });
    
    // Анимация для всплывающих чисел
    const style = document.createElement('style');
    style.textContent = `
        @keyframes popupAnim {
            0% { opacity: 1; transform: translateY(0) scale(0.8); }
            100% { opacity: 0; transform: translateY(-50px) scale(1); }
        }
    `;
    document.head.appendChild(style);
    
    // ========== ФУНКЦИИ ИГРЫ ==========
    function getPassiveRate() {
        let rate = passiveIncomeLevel * 5;
        if (hasSun) rate += 100000;
        else if (hasEarth) rate += 50000;
        else if (hasMoon) rate += 20000;
        return rate;
    }
    
    function updateUI() {
        document.getElementById('coins').textContent = Math.floor(coins);
        document.getElementById('energyValue').textContent = `${Math.floor(energy)}/${maxEnergy}`;
        document.getElementById('energyFill').style.width = (energy / maxEnergy) * 100 + '%';
        document.getElementById('clickPower').textContent = clickPower;
        document.getElementById('passiveRate').textContent = getPassiveRate();
    }
    
    function showMessage(text, isError = false) {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.style.color = isError ? '#ff6b6b' : '#FFD60A';
        msg.style.display = 'block';
        msg.style.animation = 'fadeOut 2s forwards';
        setTimeout(() => {
            msg.style.display = 'none';
            msg.style.animation = '';
        }, 2000);
    }
    
    function saveGame() {
        const gameData = {
            coins: Math.floor(coins),
            energy: energy,
            maxEnergy: maxEnergy,
            clickPower: clickPower,
            passiveIncomeLevel: passiveIncomeLevel,
            hasMoon: hasMoon,
            hasEarth: hasEarth,
            hasSun: hasSun
        };
        localStorage.setItem('starToPlanet', JSON.stringify(gameData));
    }
    
    function loadGame() {
        const saved = localStorage.getItem('starToPlanet');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                coins = data.coins || 0;
                energy = data.energy ?? 100;
                maxEnergy = data.maxEnergy || 100;
                clickPower = data.clickPower || 1;
                passiveIncomeLevel = data.passiveIncomeLevel || 0;
                hasMoon = data.hasMoon || false;
                hasEarth = data.hasEarth || false;
                hasSun = data.hasSun || false;
                if (energy > maxEnergy) energy = maxEnergy;
            } catch(e) {}
        }
        updateUI();
    }
    
    function sendDataToBot() {
        const gameData = {
            coins: Math.floor(coins),
            energy: energy,
            maxEnergy: maxEnergy,
            clickPower: clickPower,
            passiveIncomeLevel: passiveIncomeLevel,
            hasMoon: hasMoon,
            hasEarth: hasEarth,
            hasSun: hasSun
        };
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.sendData(JSON.stringify(gameData));
        }
    }
    
    // ========== БУСТЫ ==========
    function upgradeClick() {
        const cost = 100 * Math.pow(1.3, clickPower - 1);
        if (coins >= cost && clickPower < 100) {
            coins -= cost;
            clickPower++;
            updateUI();
            saveGame();
            sendDataToBot();
            showMessage(`✅ Сила клика +1 (${clickPower})`);
        } else {
            showMessage(`❌ Нужно ${Math.floor(cost)} монет`, true);
        }
    }
    
    function upgradeEnergy() {
        const cost = 200 * Math.pow(1.25, (maxEnergy - 100) / 50);
        if (coins >= cost && maxEnergy < 500) {
            coins -= cost;
            maxEnergy += 50;
            energy += 50;
            updateUI();
            saveGame();
            sendDataToBot();
            showMessage(`✅ Макс. энергия +50 (${maxEnergy})`);
        } else {
            showMessage(`❌ Нужно ${Math.floor(cost)} монет`, true);
        }
    }
    
    function upgradePassive() {
        const cost = 500 * Math.pow(1.25, passiveIncomeLevel);
        if (coins >= cost && passiveIncomeLevel < 100) {
            coins -= cost;
            passiveIncomeLevel++;
            updateUI();
            saveGame();
            sendDataToBot();
            showMessage(`✅ Пассивный доход +5/мин (${getPassiveRate()}/мин)`);
        } else {
            showMessage(`❌ Нужно ${Math.floor(cost)} монет`, true);
        }
    }
    
    // ========== НАВИГАЦИЯ ==========
    let currentTab = 'game';
    
    function showTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.nav-btn').forEach(btn => {
            if (btn.dataset.tab === tab) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        
        if (tab === 'boost') {
            showBoostPanel();
        } else if (tab === 'profile') {
            showProfilePanel();
        }
    }
    
    function closePanel() {
        const panel = document.querySelector('.floating-panel');
        if (panel) panel.remove();
    }
    
    function showBoostPanel() {
        closePanel();
        const passiveRate = getPassiveRate();
        const clickCost = Math.floor(100 * Math.pow(1.3, clickPower - 1));
        const energyCost = Math.floor(200 * Math.pow(1.25, (maxEnergy - 100) / 50));
        const passiveCost = Math.floor(500 * Math.pow(1.25, passiveIncomeLevel));
        
        const panel = document.createElement('div');
        panel.className = 'floating-panel';
        panel.style.cssText = `
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 20px;
            width: 280px;
            z-index: 20;
            border: 1px solid rgba(255,214,10,0.3);
            pointer-events: auto;
        `;
        
        panel.innerHTML = `
            <h3 style="color:#FFD60A; margin-bottom:16px; text-align:center">⚡ УЛУЧШЕНИЯ</h3>
            <button id="upgrade-click" style="width:100%; padding:12px; margin-bottom:12px; background:#FFD60A; border:none; border-radius:24px; font-weight:bold; cursor:pointer">⭐ Сила клика (${clickPower}) — ${clickCost} 🪙</button>
            <button id="upgrade-energy" style="width:100%; padding:12px; margin-bottom:12px; background:#FFD60A; border:none; border-radius:24px; font-weight:bold; cursor:pointer">⚡ Энергия (${maxEnergy}) — ${energyCost} 🪙</button>
            <button id="upgrade-passive" style="width:100%; padding:12px; margin-bottom:12px; background:#FFD60A; border:none; border-radius:24px; font-weight:bold; cursor:pointer">🤖 Пассивный доход (${passiveRate}/мин) — ${passiveCost} 🪙</button>
            <button id="close-boost" style="width:100%; padding:10px; background:#333; border:none; border-radius:24px; color:white; cursor:pointer">Закрыть</button>
        `;
        
        document.body.appendChild(panel);
        
        document.getElementById('upgrade-click').onclick = () => { upgradeClick(); panel.remove(); showBoostPanel(); };
        document.getElementById('upgrade-energy').onclick = () => { upgradeEnergy(); panel.remove(); showBoostPanel(); };
        document.getElementById('upgrade-passive').onclick = () => { upgradePassive(); panel.remove(); showBoostPanel(); };
        document.getElementById('close-boost').onclick = () => panel.remove();
    }
    
    function showProfilePanel() {
        closePanel();
        const passiveRate = getPassiveRate();
        let planetName = '⭐ Белая звезда';
        if (hasSun) planetName = '☀️ Солнце';
        else if (hasEarth) planetName = '🌍 Земля';
        else if (hasMoon) planetName = '🌙 Луна';
        else if (coins >= 10000000000) planetName = '♃ Юпитер';
        else if (coins >= 1000000000) planetName = '♄ Сатурн';
        else if (coins >= 100000000) planetName = '⛢ Уран';
        else if (coins >= 10000000) planetName = '♆ Нептун';
        else if (coins >= 1000000) planetName = '♀ Венера';
        else if (coins >= 100000) planetName = '♂ Марс';
        else if (coins >= 10000) planetName = '☿ Меркурий';
        
        const panel = document.createElement('div');
        panel.className = 'floating-panel';
        panel.style.cssText = `
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 20px;
            width: 280px;
            z-index: 20;
            border: 1px solid rgba(255,214,10,0.3);
            pointer-events: auto;
        `;
        
        panel.innerHTML = `
            <h3 style="color:#FFD60A; margin-bottom:16px; text-align:center">👤 ПРОФИЛЬ</h3>
            <div style="margin-bottom:12px"><b>⭐ Уровень:</b> ${planetName}</div>
            <div style="margin-bottom:12px"><b>💰 Монет:</b> ${Math.floor(coins).toLocaleString()}</div>
            <div style="margin-bottom:12px"><b>💪 Сила клика:</b> ${clickPower}</div>
            <div style="margin-bottom:12px"><b>⚡ Энергия:</b> ${Math.floor(energy)}/${maxEnergy}</div>
            <div style="margin-bottom:12px"><b>🤖 Пассивный доход:</b> ${passiveRate}/мин</div>
            <button id="close-profile" style="width:100%; padding:10px; background:#333; border:none; border-radius:24px; color:white; cursor:pointer">Закрыть</button>
        `;
        
        document.body.appendChild(panel);
        document.getElementById('close-profile').onclick = () => panel.remove();
    }
    
    // Навигация
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            showTab(btn.dataset.tab);
        });
    });
    
    // ========== ЗВУК TOGGLE ==========
    const soundToggle = document.getElementById('soundToggle');
    soundToggle.addEventListener('click', () => {
        soundEnabled = !soundEnabled;
        soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
        showMessage(soundEnabled ? '🔊 Звук включён' : '🔇 Звук выключен');
    });
    
    // ========== ЭНЕРГИЯ ВОССТАНАВЛИВАЕТСЯ 5 В СЕКУНДУ ==========
    setInterval(() => {
        if (energy < maxEnergy) {
            energy = Math.min(energy + 5, maxEnergy);
            updateUI();
            saveGame();
        }
    }, 1000);
    
    // Пассивный доход (каждую минуту)
    setInterval(() => {
        const rate = getPassiveRate();
        if (rate > 0) {
            coins += rate;
            updateUI();
            saveGame();
            sendDataToBot();
        }
    }, 60000);
    
    // Инициализация Telegram WebApp
    if (window.Telegram && window.Telegram.WebApp) {
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
    }
    
    // Загрузка сохранённой игры
    loadGame();
    
    console.log('✅ Игра загружена: мультитап, звук, энергия 5/сек, названия вкладок');
</script>
</body>
</html>
