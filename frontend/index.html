<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Star to Planet — 3D игра</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #030318;
            color: white;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* Верхняя панель */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(20px);
            z-index: 10;
            pointer-events: auto;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-weight: bold;
            font-size: 16px;
            background: linear-gradient(135deg, #FFD60A, #FF9F0A);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .right-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .balance {
            background: rgba(0,0,0,0.6);
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            color: #FFD60A;
        }

        .sound-btn {
            background: rgba(0,0,0,0.6);
            border: none;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 18px;
            cursor: pointer;
            color: #FFD60A;
        }

        /* Энергия */
        .energy-bar {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            padding: 10px 16px;
            margin: 70px 16px 16px 16px;
            border-radius: 28px;
            pointer-events: auto;
        }

        .energy-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .energy-progress {
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            height: 6px;
            overflow: hidden;
        }

        .energy-fill {
            background: linear-gradient(90deg, #FFD60A, #FF9F0A);
            width: 100%;
            height: 100%;
            border-radius: 20px;
            transition: width 0.2s;
        }

        /* Статистика */
        .stats {
            display: flex;
            justify-content: space-between;
            padding: 8px 16px;
            font-size: 12px;
            color: #ccc;
            background: rgba(0,0,0,0.5);
            margin: 0 16px;
            border-radius: 20px;
            pointer-events: auto;
        }

        /* Нижняя навигация */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255,255,255,0.1);
            z-index: 10;
            pointer-events: auto;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: #8E8E93;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 20px;
            border-radius: 32px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn.active { 
            color: #FFD60A; 
            background: rgba(255, 214, 10, 0.15);
        }

        .nav-icon {
            font-size: 24px;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 500;
        }

        /* Всплывающие панели */
        .floating-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 24px;
            width: 280px;
            z-index: 20;
            border: 1px solid rgba(255,214,10,0.3);
            pointer-events: auto;
            text-align: center;
        }

        .floating-panel h3 {
            color: #FFD60A;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .floating-panel button {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: #FFD60A;
            border: none;
            border-radius: 28px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .floating-panel .close-btn {
            background: #333;
            color: white;
            margin-bottom: 0;
        }

        .profile-row {
            margin-bottom: 12px;
            font-size: 14px;
            text-align: left;
        }

        /* Сообщение */
        .message {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #FFD60A;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
            backdrop-filter: blur(10px);
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="ui-overlay">
    <div class="top-bar">
        <div class="logo">⭐ STAR TO PLANET</div>
        <div class="right-buttons">
            <button class="sound-btn" id="soundToggle">🔊</button>
            <div class="balance">🪙 <span id="coins">0</span></div>
        </div>
    </div>

    <div class="energy-bar">
        <div class="energy-header">
            <span>⚡ Энергия</span>
            <span id="energyValue">100/100</span>
        </div>
        <div class="energy-progress">
            <div class="energy-fill" id="energyFill" style="width:100%"></div>
        </div>
    </div>

    <div class="stats">
        <span>💪 Сила клика: <span id="clickPower">1</span></span>
        <span>🤖 Пассивный доход: <span id="passiveRate">0</span>/мин</span>
    </div>

    <div class="nav-bar">
        <button class="nav-btn active" data-tab="game">
            <div class="nav-icon">🎮</div>
            <div class="nav-label">ИГРА</div>
        </button>
        <button class="nav-btn" data-tab="boost">
            <div class="nav-icon">⚡</div>
            <div class="nav-label">БУСТ</div>
        </button>
        <button class="nav-btn" data-tab="profile">
            <div class="nav-icon">👤</div>
            <div class="nav-label">ПРОФИЛЬ</div>
        </button>
        <button class="nav-btn" data-tab="rating">
            <div class="nav-icon">🏆</div>
            <div class="nav-label">РЕЙТИНГ</div>
        </button>
    </div>
</div>

<div id="message" class="message" style="display:none"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // ========== ИГРОВЫЕ ПЕРЕМЕННЫЕ ==========
    let coins = 0;
    let energy = 100;
    let maxEnergy = 100;
    let clickPower = 1;
    let passiveIncomeLevel = 0;
    let hasMoon = false;
    let hasEarth = false;
    let hasSun = false;
    
    let lastClickTime = 0;
    let clickCooldown = 30;
    
    // Telegram WebApp
    let tg = null;
    if (window.Telegram && window.Telegram.WebApp) {
        tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
    }
    
    // ========== ЗВУК ==========
    let soundEnabled = true;
    let playTapSound = null;
    let audioContext = null;
    
    function initAudio() {
        if (audioContext) return;
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const gainNode = audioContext.createGain();
            gainNode.gain.value = 0.25;
            gainNode.connect(audioContext.destination);
            
            playTapSound = () => {
                if (!soundEnabled) return;
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(gainNode);
                osc.frequency.value = 880;
                gain.gain.value = 0.15;
                osc.type = 'sine';
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.2);
                osc.stop(audioContext.currentTime + 0.2);
            };
        } catch(e) {
            console.log('Web Audio API не поддерживается');
        }
    }
    
    // ========== 3D СЦЕНА ==========
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x030318);
    scene.fog = new THREE.FogExp2(0x030318, 0.003);
    
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 4);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);
    
    // Освещение
    const ambientLight = new THREE.AmbientLight(0x404060);
    scene.add(ambientLight);
    
    const mainLight = new THREE.DirectionalLight(0xffffff, 1);
    mainLight.position.set(2, 3, 4);
    scene.add(mainLight);
    
    const fillLight = new THREE.PointLight(0x4466aa, 0.5);
    fillLight.position.set(-2, 1, 2);
    scene.add(fillLight);
    
    // Планета
    const geometry = new THREE.SphereGeometry(1, 128, 128);
    const textureLoader = new THREE.TextureLoader();
    const earthMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
    const material = new THREE.MeshStandardMaterial({
        map: earthMap,
        roughness: 0.5,
        metalness: 0.1
    });
    const planet = new THREE.Mesh(geometry, material);
    scene.add(planet);
    
    // Звёзды
    const starCount = 1500;
    const starGeometry = new THREE.BufferGeometry();
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
        starPositions[i*3] = (Math.random() - 0.5) * 200;
        starPositions[i*3+1] = (Math.random() - 0.5) * 200;
        starPositions[i*3+2] = (Math.random() - 0.5) * 100 - 50;
    }
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starMaterialObj = new THREE.PointsMaterial({ color: 0xffffff, size: 0.12, transparent: true, opacity: 0.6 });
    const stars = new THREE.Points(starGeometry, starMaterialObj);
    scene.add(stars);
    
    function animate() {
        requestAnimationFrame(animate);
        planet.rotation.y += 0.003;
        stars.rotation.y += 0.0005;
        renderer.render(scene, camera);
    }
    animate();
    
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // ========== ОТПРАВКА ДАННЫХ В БОТА ==========
    function syncWithBot() {
        if (tg) {
            const gameData = {
                coins: Math.floor(coins),
                energy: energy,
                maxEnergy: maxEnergy,
                clickPower: clickPower,
                passiveIncomeLevel: passiveIncomeLevel,
                hasMoon: hasMoon,
                hasEarth: hasEarth,
                hasSun: hasSun
            };
            tg.sendData(JSON.stringify(gameData));
        }
    }
    
    // ========== МУЛЬТИТАП ==========
    function handleTap(clientX, clientY) {
        const now = Date.now();
        if (now - lastClickTime < clickCooldown) return;
        lastClickTime = now;
        
        if (energy < clickPower) {
            showMessage('❌ Нет энергии!', true);
            return;
        }
        
        if (!audioContext) initAudio();
        if (playTapSound) playTapSound();
        
        energy -= clickPower;
        coins += clickPower;
        
        planet.scale.set(0.96, 0.96, 0.96);
        setTimeout(() => planet.scale.set(1, 1, 1), 100);
        
        const flashLight = new THREE.PointLight(0xffaa66, 0.8);
        flashLight.position.set(
            (clientX / window.innerWidth - 0.5) * 5,
            -(clientY / window.innerHeight - 0.5) * 4,
            2
        );
        scene.add(flashLight);
        setTimeout(() => scene.remove(flashLight), 150);
        
        const popup = document.createElement('div');
        popup.textContent = `+${clickPower}`;
        popup.style.position = 'fixed';
        popup.style.left = clientX + 'px';
        popup.style.top = clientY - 30 + 'px';
        popup.style.color = '#FFD60A';
        popup.style.fontSize = '22px';
        popup.style.fontWeight = 'bold';
        popup.style.pointerEvents = 'none';
        popup.style.zIndex = '1000';
        popup.style.textShadow = '0 0 5px black';
        popup.style.animation = 'popupAnim 0.4s ease-out forwards';
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 400);
        
        updateUI();
        saveGame();
        syncWithBot();
    }
    
    renderer.domElement.addEventListener('touchstart', (e) => {
        e.preventDefault();
        for (let i = 0; i < e.touches.length; i++) {
            handleTap(e.touches[i].clientX, e.touches[i].clientY);
        }
    });
    
    renderer.domElement.addEventListener('mousedown', (e) => {
        e.preventDefault();
        handleTap(e.clientX, e.clientY);
    });
    
    const styleAnim = document.createElement('style');
    styleAnim.textContent = `
        @keyframes popupAnim {
            0% { opacity: 1; transform: translateY(0) scale(0.8); }
            100% { opacity: 0; transform: translateY(-40px) scale(1); }
        }
    `;
    document.head.appendChild(styleAnim);
    
    // ========== ИГРОВАЯ ЛОГИКА ==========
    function getPassiveRate() {
        let rate = passiveIncomeLevel * 5;
        if (hasSun) rate += 100000;
        else if (hasEarth) rate += 50000;
        else if (hasMoon) rate += 20000;
        return rate;
    }
    
    function updateUI() {
        document.getElementById('coins').textContent = Math.floor(coins);
        document.getElementById('energyValue').textContent = `${Math.floor(energy)}/${maxEnergy}`;
        document.getElementById('energyFill').style.width = (energy / maxEnergy) * 100 + '%';
        document.getElementById('clickPower').textContent = clickPower;
        document.getElementById('passiveRate').textContent = getPassiveRate();
    }
    
    function showMessage(text, isError = false) {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.style.color = isError ? '#ff6b6b' : '#FFD60A';
        msg.style.display = 'block';
        msg.style.animation = 'fadeOut 2s forwards';
        setTimeout(() => {
            msg.style.display = 'none';
            msg.style.animation = '';
        }, 2000);
    }
    
    function saveGame() {
        const gameData = {
            coins: Math.floor(coins),
            energy: energy,
            maxEnergy: maxEnergy,
            clickPower: clickPower,
            passiveIncomeLevel: passiveIncomeLevel,
            hasMoon: hasMoon,
            hasEarth: hasEarth,
            hasSun: hasSun
        };
        localStorage.setItem('starToPlanet', JSON.stringify(gameData));
    }
    
    function loadGame() {
        const saved = localStorage.getItem('starToPlanet');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                coins = data.coins || 0;
                energy = data.energy ?? 100;
                maxEnergy = data.maxEnergy || 100;
                clickPower = data.clickPower || 1;
                passiveIncomeLevel = data.passiveIncomeLevel || 0;
                hasMoon = data.hasMoon || false;
                hasEarth = data.hasEarth || false;
                hasSun = data.hasSun || false;
                if (energy > maxEnergy) energy = maxEnergy;
            } catch(e) {}
        }
        updateUI();
    }
    
    // ========== БУСТЫ ==========
    function upgradeClick() {
        const cost = Math.floor(100 * Math.pow(1.3, clickPower - 1));
        if (coins >= cost && clickPower < 100) {
            coins -= cost;
            clickPower++;
            updateUI();
            saveGame();
            syncWithBot();
            showMessage(`✅ Сила клика +1 (${clickPower})`);
        } else {
            showMessage(`❌ Нужно ${cost} монет`, true);
        }
    }
    
    function upgradeEnergy() {
        const level = (maxEnergy - 100) / 50;
        const cost = Math.floor(200 * Math.pow(1.25, level));
        if (coins >= cost && maxEnergy < 500) {
            coins -= cost;
            maxEnergy += 50;
            energy += 50;
            updateUI();
            saveGame();
            syncWithBot();
            showMessage(`✅ Макс. энергия +50 (${maxEnergy})`);
        } else {
            showMessage(`❌ Нужно ${cost} монет`, true);
        }
    }
    
    function upgradePassive() {
        const cost = Math.floor(500 * Math.pow(1.25, passiveIncomeLevel));
        if (coins >= cost && passiveIncomeLevel < 100) {
            coins -= cost;
            passiveIncomeLevel++;
            updateUI();
            saveGame();
            syncWithBot();
            showMessage(`✅ Пассивный доход +5/мин (${getPassiveRate()}/мин)`);
        } else {
            showMessage(`❌ Нужно ${cost} монет`, true);
        }
    }
    
    // ========== ПАНЕЛИ ==========
    function closePanel() {
        const panel = document.querySelector('.floating-panel');
        if (panel) panel.remove();
    }
    
    function showBoostPanel() {
        closePanel();
        const passiveRate = getPassiveRate();
        const clickCost = Math.floor(100 * Math.pow(1.3, clickPower - 1));
        const level = (maxEnergy - 100) / 50;
        const energyCost = Math.floor(200 * Math.pow(1.25, level));
        const passiveCost = Math.floor(500 * Math.pow(1.25, passiveIncomeLevel));
        
        const panel = document.createElement('div');
        panel.className = 'floating-panel';
        panel.innerHTML = `
            <h3>⚡ УЛУЧШЕНИЯ</h3>
            <button id="upgrade-click">⭐ Сила клика (${clickPower}) — ${clickCost} 🪙</button>
            <button id="upgrade-energy">⚡ Энергия (${maxEnergy}) — ${energyCost} 🪙</button>
            <button id="upgrade-passive">🤖 Пассивный доход (${passiveRate}/мин) — ${passiveCost} 🪙</button>
            <button class="close-btn" id="close-boost">Закрыть</button>
        `;
        document.body.appendChild(panel);
        
        document.getElementById('upgrade-click').onclick = () => { upgradeClick(); panel.remove(); showBoostPanel(); };
        document.getElementById('upgrade-energy').onclick = () => { upgradeEnergy(); panel.remove(); showBoostPanel(); };
        document.getElementById('upgrade-passive').onclick = () => { upgradePassive(); panel.remove(); showBoostPanel(); };
        document.getElementById('close-boost').onclick = () => panel.remove();
    }
    
    function showProfilePanel() {
        closePanel();
        const passiveRate = getPassiveRate();
        let planetName = '⭐ Белая звезда';
        if (hasSun) planetName = '☀️ Солнце';
        else if (hasEarth) planetName = '🌍 Земля';
        else if (hasMoon) planetName = '🌙 Луна';
        else if (coins >= 10000000000) planetName = '♃ Юпитер';
        else if (coins >= 1000000000) planetName = '♄ Сатурн';
        else if (coins >= 100000000) planetName = '⛢ Уран';
        else if (coins >= 10000000) planetName = '♆ Нептун';
        else if (coins >= 1000000) planetName = '♀ Венера';
        else if (coins >= 100000) planetName = '♂ Марс';
        else if (coins >= 10000) planetName = '☿ Меркурий';
        
        const panel = document.createElement('div');
        panel.className = 'floating-panel';
        panel.innerHTML = `
            <h3>👤 ПРОФИЛЬ</h3>
            <div class="profile-row"><b>⭐ Уровень:</b> ${planetName}</div>
            <div class="profile-row"><b>💰 Монет:</b> ${Math.floor(coins).toLocaleString()}</div>
            <div class="profile-row"><b>💪 Сила клика:</b> ${clickPower}</div>
            <div class="profile-row"><b>⚡ Энергия:</b> ${Math.floor(energy)}/${maxEnergy}</div>
            <div class="profile-row"><b>🤖 Пассивный доход:</b> ${passiveRate}/мин</div>
            <button class="close-btn" id="close-profile">Закрыть</button>
        `;
        document.body.appendChild(panel);
        document.getElementById('close-profile').onclick = () => panel.remove();
    }
    
    function showRatingPanel() {
        closePanel();
        
        // Получаем данные из localStorage или создаём демо
        let players = [];
        const savedRating = localStorage.getItem('starToPlanetRating');
        if (savedRating) {
            players = JSON.parse(savedRating);
        } else {
            players = [
                { name: 'Вы', coins: Math.floor(coins), isCurrent: true },
                { name: 'Александр', coins: 1250000 },
                { name: 'Екатерина', coins: 850000 },
                { name: 'Дмитрий', coins: 420000 },
                { name: 'Сергей', coins: 210000 }
            ];
        }
        
        // Обновляем текущего игрока
        const currentPlayer = players.find(p => p.isCurrent);
        if (currentPlayer) {
            currentPlayer.coins = Math.floor(coins);
        } else {
            players.unshift({ name: 'Вы', coins: Math.floor(coins), isCurrent: true });
        }
        players.sort((a,b) => b.coins - a.coins);
        localStorage.setItem('starToPlanetRating', JSON.stringify(players));
        
        let html = '<h3>🏆 ТАБЛИЦА ЛИДЕРОВ</h3>';
        for (let i = 0; i < Math.min(players.length, 10); i++) {
            const p = players[i];
            let medal = '';
            if (i === 0) medal = '👑 ';
            else if (i === 1) medal = '🥈 ';
            else if (i === 2) medal = '🥉 ';
            else medal = `${i+1}. `;
            const marker = p.isCurrent ? ' 👈' : '';
            html += `<div class="profile-row" style="${p.isCurrent ? 'color:#FFD60A; font-weight:bold;' : ''}">${medal}${p.name} — ${p.coins.toLocaleString()} 🪙${marker}</div>`;
        }
        html += '<button class="close-btn" id="close-rating">Закрыть</button>';
        
        const panel = document.createElement('div');
        panel.className = 'floating-panel';
        panel.innerHTML = html;
        document.body.appendChild(panel);
        document.getElementById('close-rating').onclick = () => panel.remove();
    }
    
    function showTab(tab) {
        document.querySelectorAll('.nav-btn').forEach(btn => {
            if (btn.dataset.tab === tab) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        closePanel();
        
        if (tab === 'boost') showBoostPanel();
        else if (tab === 'profile') showProfilePanel();
        else if (tab === 'rating') showRatingPanel();
    }
    
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => showTab(btn.dataset.tab));
    });
    
    // ========== ЗВУК TOGGLE ==========
    const soundToggle = document.getElementById('soundToggle');
    soundToggle.addEventListener('click', () => {
        soundEnabled = !soundEnabled;
        soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
        showMessage(soundEnabled ? '🔊 Звук включён' : '🔇 Звук выключен');
    });
    
    // ========== ЭНЕРГИЯ 5/СЕК ==========
    setInterval(() => {
        if (energy < maxEnergy) {
            energy = Math.min(energy + 5, maxEnergy);
            updateUI();
            saveGame();
        }
    }, 1000);
    
    // Пассивный доход каждую минуту
    setInterval(() => {
        const rate = getPassiveRate();
        if (rate > 0) {
            coins += rate;
            updateUI();
            saveGame();
            syncWithBot();
        }
    }, 60000);
    
    // Загрузка сохранённой игры
    loadGame();
    
    console.log('✅ Игра загружена: мультитап, звук, энергия 5/сек, вкладки с названиями, рейтинг, синхронизация с ботом');
</script>
</body>
</html>
